error_log /var/log/nginx/error.log debug;
access_log /var/log/nginx/access.log;

server {
    listen 443 ssl;
    server_name 192.168.1.147;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    client_max_body_size 20M;

    # Frontend
    location / {
        proxy_pass http://frontend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme; # IMPORTANTE
    }

    # Backend
    location /api {
        proxy_pass http://backend:8080; # Sem o /api no final se o Spring já o tiver
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme; # IMPORTANTE PARA O JWT
    }
}

server {
    listen 80;
    server_name 192.168.1.147;
    return 301 https://$host$request_uri;
}