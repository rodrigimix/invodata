spring.application.name=invodata
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
server.port=${PORT:8080}

spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.data.mongodb.uri=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

spring.threads.virtual.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true


invodata.admin.registration-key=
invodata.jwt.secret=
invodata.jwt.expiration=86400000
invodata.ai.enable=true
invodata.python.api=
invodata.vies.url=https://ec.europa.eu/taxation_customs/vies/rest-api/ms/
invodata.sicae.url=http://www.sicae.pt/Detalhe.aspx?NIPC=
invodata.max.upload=100
invodata.upload.max-concurrent=4
invodata.media.path=mnt/invodata/
invodata.storage.type=local
invodata.gcs.bucket=
