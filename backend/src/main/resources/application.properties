spring.application.name=invodata
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
server.port=${PORT:8080}

spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.data.mongodb.uri=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=10MB

spring.threads.virtual.enabled=true

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true


invodata.jwt.secret=
invodata.jwt.expiration=86400000
admin.stats.password=${ADMIN_STATS_PASSWORD:}
invodata.frontend.url=${INVODATA_FRONTEND_URL:http://localhost:8081}
invodata.cors.allowed-origins=${INVODATA_CORS_ALLOWED_ORIGINS:}
invodata.mail.from=${INVODATA_MAIL_FROM:invodata.noreply@gmail.com}
invodata.mail.enabled=${INVODATA_MAIL_ENABLED:true}
invodata.ai.enable=true
invodata.ai.credentials.path=/data/local/credentials/google.json
invodata.ai.consent.version=v1
invodata.privacy.version=v1
invodata.python.api=
invodata.vies.url=https://ec.europa.eu/taxation_customs/vies/rest-api/ms/
invodata.sicae.url=http://www.sicae.pt/Detalhe.aspx?NIPC=
invodata.upload.max-concurrent=4
invodata.media.path=mnt/invodata/
invodata.storage.type=local
invodata.storage.encryption.enabled=true
invodata.storage.encryption.key=
invodata.storage.encryption.kmsKey=
invodata.gcs.bucket=
invodata.mfa.trust-days=30
invodata.notifications.test-enabled=false
invodata.project.path=/workspace
invodata.allow.compose.restart=false
