services:
  mongodb:
    image: mongo:7
    container_name: invodata-mongodb
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    image: nginx:alpine
    container_name: invodata-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

  backend:
    build: ./backend
    container_name: invodata-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SERVER_FORWARD_HEADERS_STRATEGY: native

      # Base de Dados (Lê diretamente do seu .env)
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-none}

      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/invodata

      # Segurança e Admin
      INVODATA_JWT_SECRET: ${INVODATA_JWT_SECRET}
      INVODATA_JWT_EXPIRATION: ${INVODATA_JWT_EXPIRATION}
      INVODATA_ADMIN_REGISTRATION_KEY: ${INVODATA_ADMIN_REGISTRATION_KEY}

      # Integrações
      INVODATA_PYTHON_API: ${INVODATA_PYTHON_API}
      INVODATA_VIES_URL: ${INVODATA_VIES_URL}
      INVODATA_SICAE_URL: ${INVODATA_SICAE_URL}
      INVODATA_FRONTEND_URL: ${INVODATA_FRONTEND_URL:-http://localhost:8081}

      # Armazenamento
      INVODATA_STORAGE_TYPE: ${INVODATA_STORAGE_TYPE}
      INVODATA_MEDIA_PATH: ${INVODATA_MEDIA_PATH}
      INVODATA_GCS_BUCKET: ${INVODATA_GCS_BUCKET}
      INVODATA_MAX_UPLOAD: ${INVODATA_MAX_UPLOAD}
      INVODATA_UPLOAD_MAX_CONCURRENT: ${INVODATA_UPLOAD_MAX_CONCURRENT}

      # IA
      INVODATA_AI_ENABLE: ${INVODATA_AI_ENABLE}
      INVODATA_AI_CREDENTIALS_PATH: ${INVODATA_AI_CREDENTIALS_PATH}

      # Outros
      INVODATA_PROJECT_PATH: /workspace
      INVODATA_ALLOW_COMPOSE_RESTART: "true"

      LOGGING_LEVEL_ROOT: DEBUG
      LOGGING_LEVEL_PT_RODRIGIMIX_INVODATA: DEBUG
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB: DEBUG
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: DEBUG

      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 20MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 20MB

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace
      - invodata-media-local:/data/local

  python-api:
    build: ./api-python
    container_name: invodata-python-api
    restart: unless-stopped
    environment:
      PORT: 8001
      INVODATA_AI_ENABLED: ${INVODATA_AI_ENABLE:-true}
      GOOGLE_APPLICATION_CREDENTIALS: ${INVODATA_AI_CREDENTIALS_PATH}
      GCP_PROJECT: ${GCP_PROJECT}
      GCP_LOCATION: ${GCP_LOCATION:-europe-west4}
      LOG_LEVEL: debug
      PYTHONUNBUFFERED: "1"
    volumes:
      - invodata-media-local:/data/local

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: invodata-frontend
    restart: unless-stopped
    ports:
      - "8081:8080"

volumes:
  mongodb-data:
  invodata-media-local:
    driver: local
    driver_opts:
      type: nfs
      o: addr=192.168.1.234,rw,nfsvers=4.1,minorversion=1,nolock,soft
      device: ":/volume1/invodata"